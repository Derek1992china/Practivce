*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:#f7f8fb;color:#181a1f}button,input{font:inherit}button{border:0;cursor:pointer}.app{min-height:100vh;display:grid;grid-template-columns:330px 1fr}.side{background:#262a31;color:white;padding:24px;display:flex;flex-direction:column;gap:18px}.brand{display:flex;gap:12px;align-items:center}.logo{width:44px;height:44px;border-radius:8px;background:white;color:#e94d2e;display:grid;place-items:center;font-weight:900}.brand h1{font-size:23px;margin:0}.brand p,.note{color:#b9c0cb;line-height:1.6}.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px}.stat{border:1px solid #414752;border-radius:8px;padding:14px;background:#303641}.stat b{font-size:30px;display:block}.body{padding:24px;display:grid;gap:18px}.top{display:flex;justify-content:space-between;gap:12px}.top h2{font-size:30px;margin:0 0 8px}.top p{margin:0;color:#66707d}.grid{display:grid;grid-template-columns:1.1fr .9fr;gap:18px}.panel{background:white;border:1px solid #e1e5ea;border-radius:8px;box-shadow:0 14px 35px #171b2417;padding:18px}.tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;background:#f0f2f5;border:1px solid #e1e5ea;border-radius:8px;padding:5px}.tabs button{border-radius:6px;min-height:36px;background:transparent;color:#66707d}.tabs .on{background:white;color:#181a1f;box-shadow:0 5px 12px #0001}.head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}.head h3{margin:0}.list{display:grid;gap:10px}.ex{display:grid;grid-template-columns:42px 1fr auto;gap:12px;align-items:center;text-align:left;border:1px solid #e1e5ea;border-radius:8px;background:white;padding:12px}.ex.on{border-color:#e94d2e;background:#fff7f4}.num{width:42px;height:42px;border-radius:8px;background:#f1f3f6;color:#e94d2e;display:grid;place-items:center;font-weight:800}.ex h4{margin:0}.ex p{margin:4px 0 0;color:#66707d;font-size:13px}.stack{display:grid;gap:18px}.now h3{font-size:24px;margin:0 0 8px}.now p{margin:0;color:#66707d;line-height:1.5}.ring{--p:0deg;width:min(260px,70vw);aspect-ratio:1;border-radius:50%;margin:18px auto;display:grid;place-items:center;background:conic-gradient(#e94d2e var(--p),#edf0f3 0);position:relative}.ring:before{content:"";position:absolute;inset:14px;border-radius:50%;background:white;border:1px solid #e1e5ea}.time{position:relative;text-align:center}.time b{font-size:58px;font-variant-numeric:tabular-nums}.time span{display:block;color:#66707d}.ctrl{display:grid;grid-template-columns:46px 1fr 46px;gap:10px}.ctrl button,.finish,.reset{min-height:46px;border-radius:8px}.ctrl button{background:#f1f3f6;border:1px solid #e1e5ea}.start{background:#e94d2e!important;color:white!important;font-weight:800}.opts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}.opt{display:flex;justify-content:space-between;align-items:center;background:#f1f3f6;border:1px solid #e1e5ea;border-radius:8px;padding:8px 10px;color:#66707d}.opt input{width:62px;border:1px solid #d8dde4;border-radius:6px;padding:6px;text-align:center}.week{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}.day{aspect-ratio:1;border-radius:8px;background:#f1f3f6;border:1px solid #e1e5ea;display:grid;place-items:center;color:#66707d}.day.ok{background:#e9f8f1;color:#147452;font-weight:800}.finish{width:100%;background:#256fd4;color:white;font-weight:800;margin-top:14px}.reset{width:44px;background:#f1f3f6;border:1px solid #e1e5ea}.abs{width:100%;height:auto;background:#f7f1ea;border-radius:8px;padding:10px}.tip{font-size:13px;color:#66707d;line-height:1.6}@media(max-width:900px){.app,.grid{grid-template-columns:1fr}.side{min-height:auto}.top h2{font-size:24px}}@media(max-width:560px){.side,.body{padding:16px}.head,.top{align-items:stretch;flex-direction:column}.tabs,.opts{grid-template-columns:1fr}.ex{grid-template-columns:42px 1fr}.dur{grid-column:2}.time b{font-size:48px}}
</style></head><body><div class="app"><aside class="side"><div class="brand"><div class="logo">8</div><div><h1>八块腹肌训练</h1><p>核心激活 · 腹直肌 · 腹外斜肌</p></div></div><div class="stats"><div class="stat"><b id="streak">0</b><span>连续训练天数</span></div><div class="stat"><b id="mins">0</b><span>累计分钟</span></div></div><svg class="abs" viewBox="0 0 220 260"><path d="M65 20c20 28 70 28 90 0 0 28-8 46-8 70 0 33 25 58 28 93 3 36-26 66-65 66s-68-30-65-66c3-35 28-60 28-93 0-24-8-42-8-70z" fill="#e59a72"/><g fill="#ffc29b" stroke="#9d4933" stroke-width="3"><rect x="78" y="75" width="28" height="34" rx="12"/><rect x="114" y="75" width="28" height="34" rx="12"/><rect x="77" y="118" width="29" height="36" rx="12"/><rect x="114" y="118" width="29" height="36" rx="12"/><rect x="78" y="163" width="28" height="34" rx="12"/><rect x="114" y="163" width="28" height="34" rx="12"/><rect x="82" y="205" width="24" height="28" rx="10"/><rect x="114" y="205" width="24" height="28" rx="10"/></g><path d="M110 72v160M75 55c22 18 48 18 70 0" stroke="#9d4933" stroke-width="4" fill="none" stroke-linecap="round"/></svg><p class="note">建议每周 4-5 次。腰背不适时停止训练，动作质量优先于速度。</p></aside><main class="body"><div class="top"><div><h2>今天练核心，明天线条更清楚</h2><p>选择强度后按开始，动作结束自动进入休息和下一项。</p></div><button class="reset" id="reset">↻</button></div><div class="grid"><section class="panel"><div class="head"><h3>训练计划</h3><div class="tabs"><button class="on" data-p="a">入门</button><button data-p="b">标准</button><button data-p="c">进阶</button></div></div><div id="list" class="list"></div></section><div class="stack"><section class="panel"><div class="now"><h3 id="name"></h3><p id="cue"></p></div><div class="ring" id="ring"><div class="time"><b id="left">30</b><span id="mode">训练秒</span></div></div><div class="ctrl"><button id="prev">‹</button><button id="start" class="start">开始</button><button id="next">›</button></div><div class="opts"><label class="opt">动作秒数<input id="work" type="number" min="15" max="90" step="5" value="30"></label><label class="opt">休息秒数<input id="rest" type="number" min="5" max="45" step="5" value="15"></label></div></section><section class="panel"><div class="head"><h3>本周记录</h3><span id="sum">0 / 7</span></div><div id="week" class="week"></div><button id="done" class="finish">完成今天训练</button><p class="tip" id="tip">腹肌显现主要来自长期坚持和体脂下降。</p></section></div></div></main></div><script>
const P={a:[["平板支撑","收紧腹部，骨盆微后倾。"],["卷腹","下背贴地，用腹部带起肩胛。"],["死虫","对侧手脚伸展，腰椎稳定。"],["反向卷腹","抬起骨盆，不要甩腿。"],["登山跑","肩膀稳定，膝盖向胸口收。"],["侧平板","身体成一条线，感受侧腹。"]],b:[["空中蹬车","肘膝靠近时呼气。"],["V字收腹","胸口靠向膝盖，落下控制。"],["俄罗斯转体","胸椎带动转向。"],["抬腿","腿下降时别塌腰。"],["平板触肩","骨盆尽量不晃。"],["波比半程","动作连贯，腹部收紧。"]],c:[["龙旗降阶","肩背固定，慢慢下降。"],["剪刀腿","脚跟不触地，小幅交替。"],["平板开合跳","手肘稳定，核心锁住。"],["侧平板转体","打开胸腔再回收。"],["仰卧雨刷","双腿左右摆动并控制回正。"],["V字静止","肩胛和脚跟离地。"]]},K="absApp";let S=JSON.parse(localStorage[K]||'{"p":"a","days":{},"mins":0,"w":30,"r":15}'),p=S.p,i=0,run=0,timer,phase="work",total=S.w,left=S.w;work.value=S.w;rest.value=S.r;function save(){localStorage[K]=JSON.stringify(S)}function d(x=new Date){return x.toISOString().slice(0,10)}function stop(){run=0;clearInterval(timer);start.textContent="开始"}function go(n){i=(i+n+P[p].length)%P[p].length;phase="work";total=+work.value;left=total;stop();draw()}function tick(){left--;if(left<=0){if(phase=="work"){phase="rest";total=+rest.value;left=total}else{i=(i+1)%P[p].length;phase="work";total=+work.value;left=total;draw()}}paint()}function draw(){list.innerHTML="";P[p].forEach((e,n)=>{let b=document.createElement("button");b.className="ex "+(n==i?"on":"");b.innerHTML=`<span class=num>${n+1}</span><span><h4>${e[0]}</h4><p>${e[1]}</p></span><span class=dur>${work.value}秒</span>`;b.onclick=()=>{i=n;go(0)};list.appendChild(b)});name.textContent=P[p][i][0];cue.textContent=P[p][i][1];paint();progress()}function paint(){left=Math.max(0,left);document.getElementById("left").textContent=left;mode.textContent=phase=="work"?"训练秒":"休息秒";ring.style.setProperty("--p",(360*(total-left)/Math.max(total,1))+"deg");ring.style.background=`conic-gradient(${phase=="work"?"#e94d2e":"#26a978"} var(--p),#edf0f3 0)`}function progress(){let now=new Date,wd=now.getDay()||7,ok=0;week.innerHTML="";for(let n=1;n<8;n++){let x=new Date(now);x.setDate(now.getDate()+n-wd);let v=S.days[d(x)],el=document.createElement("div");el.className="day "+(v?"ok":"");el.textContent="一二三四五六日"[n-1];week.appendChild(el);if(v)ok++}sum.textContent=ok+" / 7";mins.textContent=S.mins||0;let st=0,x=new Date;while(S.days[d(x)]){st++;x.setDate(x.getDate()-1)}streak.textContent=st}document.querySelectorAll(".tabs button").forEach(b=>b.onclick=()=>{p=S.p=b.dataset.p;i=0;document.querySelectorAll(".tabs button").forEach(x=>x.classList.toggle("on",x==b));stop();left=total=+work.value;save();draw()});start.onclick=()=>{if(run)return stop();run=1;start.textContent="暂停";timer=setInterval(tick,1000)};prev.onclick=()=>go(-1);next.onclick=()=>go(1);work.onchange=()=>{S.w=work.value=Math.min(90,Math.max(15,+work.value||30));save();if(!run){left=total=+work.value;draw()}};rest.onchange=()=>{S.r=rest.value=Math.min(45,Math.max(5,+rest.value||15));save()};done.onclick=()=>{S.days[d()]=1;S.mins=(S.mins||0)+Math.round(P[p].length*work.value/60);save();tip.textContent="已记录今天训练，明天继续保持。";progress()};reset.onclick=()=>confirm("清空本地训练记录吗？")&&(localStorage.removeItem(K),location.reload());draw();
</script></body></html>
